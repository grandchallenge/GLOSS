name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  package-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements-dev.txt
      - run: python scripts/validate_package.py

  lean-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: scaffold
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false
      - name: Resolve and build Lean scaffold
        working-directory: scaffold
        shell: bash
        run: |
          set -o pipefail
          {
            echo '$ lake update'
            lake update
            echo '$ lake build'
            lake build
          } 2>&1 | tee ../lean-build.log
      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: error
